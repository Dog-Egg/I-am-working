<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>时间到了</title>
    <link rel="stylesheet" href="./prompt.css" />
  </head>
  <body>
    <main class="prompt-shell">
      <p class="eyebrow">工作提醒</p>
      <h1>时间到了</h1>
      <p class="message">是否继续工作？</p>

      <div class="actions">
        <button id="stop-button" class="secondary-button" type="button">先暂停</button>
        <button id="continue-button" class="primary-button" type="button" autofocus>继续工作</button>
      </div>
    </main>

    <script src="./prompt.js"></script>
  </body>
</html>
